<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Choose a meal</title>
</head>
<body>
    <h1>Choose a meal</h1>
    <div id="buttons">
        <button id="pizza" data-img="photos/pizza.jpg" data-message="You choose pizza!!!">Pizza</button>
        <button id="sushi" data-img="photos/sushi.jpg" data-message="Nice choice!!!">Sushi</button>
        <button id="burger" data-img="photos/burger.jpg" data-message="Enjoy!!!">Burger</button>
        <button id="salad" data-img="photos/salad.jpg" data-message="Very healthy!!!">Salad</button>
    </div>
    <div id="images">
        <img id="meal-image" src="" alt="Meal Image">
    </div>
    <div id="text-message">
        <p></p>
    </div>
    <div id="startBtn">
        <button id="startOver">Start Over</button>
    </div>
   
</body>
<script src="script.js"></script>
</html>
